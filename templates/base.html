<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}图书管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'book_list' %}">图书管理系统</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                <span class="nav-link">欢迎，{{ user.username }}</span>
                <a class="nav-link" href="{% url 'my_borrows' %}">我的借阅</a>
                <a class="nav-link" href="{% url 'statistics' %}">统计报表</a>
                {% if user.is_staff %}
                <a class="nav-link" href="{% url 'log_list' %}">操作日志</a>
                {% endif %}
                <a class="nav-link" href="{% url 'logout' %}">退出</a>
                {% else %}
                <a class="nav-link" href="{% url 'login' %}">登录</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
