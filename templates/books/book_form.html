{% extends 'base.html' %}
{% block title %}{{ form.instance.pk|yesno:"编辑图书,添加图书" }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>{{ form.instance.pk|yesno:"编辑图书,添加图书" }}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'book_list' %}" class="btn btn-secondary">取消</a>
        </form>
    </div>
</div>
{% endblock %}
